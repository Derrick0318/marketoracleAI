<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Oracle Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='alerts.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  </head>
  <body class="admin-login-body">
    <main class="shell admin-login-shell">
      <section class="admin-login-panel">
        <div class="admin-login-head">
          <div class="brand-block">
            <div class="brand-mark"><i data-lucide="shield-lock"></i></div>
            <div>
              <h1>Admin Login</h1>
              <p>Market Oracle AI control room</p>
            </div>
          </div>
          <a class="admin-link" href="/" title="Back to dashboard">
            <i data-lucide="home"></i>
            <span>Dashboard</span>
          </a>
        </div>

        <form class="admin-login-form" method="post" autocomplete="off">
          <label>
            <span>Username</span>
            <input name="username" type="text" inputmode="text" autocomplete="username" required autofocus />
          </label>
          <label>
            <span>Password</span>
            <span class="password-control">
              <input id="adminPassword" name="password" type="password" autocomplete="current-password" required />
              <button id="toggleAdminPassword" type="button" title="Show password" aria-label="Show password">
                <i data-lucide="eye"></i>
              </button>
            </span>
          </label>

          {% if error %}
            <p class="login-error">{{ error }}</p>
          {% endif %}

          <button class="refresh-button admin-login-button" type="submit">
            <i data-lucide="log-in"></i>
            <span>Login</span>
          </button>
        </form>
      </section>
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        if (window.lucide) window.lucide.createIcons();

        const password = document.querySelector("#adminPassword");
        const toggle = document.querySelector("#toggleAdminPassword");
        if (!password || !toggle) return;

        toggle.addEventListener("click", () => {
          const isHidden = password.type === "password";
          password.type = isHidden ? "text" : "password";
          toggle.title = isHidden ? "Hide password" : "Show password";
          toggle.setAttribute("aria-label", toggle.title);
          toggle.innerHTML = `<i data-lucide="${isHidden ? "eye-off" : "eye"}"></i>`;
          if (window.lucide) window.lucide.createIcons();
          password.focus();
        });
      });
    </script>
  </body>
</html>
